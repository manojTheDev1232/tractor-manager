<div class="container">
  <h5>Add Plowing Job</h5>
  <form action="">
    <div class="row">
      <div class="col">
        <label class="form-label" for="">Farmer name</label>
        <select class="form-select" name="" id="">
          <option value="">Select Farmer name</option>
          <option *ngFor="let farmer of farmerList" value="">
            {{ farmer.name }}
          </option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col-6">
        <label class="form-label">Field / acres</label>
        <input class="form-control" type="text" placeholder="e.g.4" />
      </div>
      <div class="col">
        <label class="form-label">Rate per acre (&#8377;)</label>
        <input class="form-control" type="text" placeholder="e.g.4" />
      </div>
    </div>
    <div class="row">
      <div class="col">
        <label class="form-label">Total Amount (&#8377;)</label>
        <input class="form-control" type="text" placeholder="Auto calculated" />
      </div>
    </div>
    <div class="row">
      <div class="col-6">
        <label class="form-label">Date</label>
        <input
          class="form-control"
          [value]="currentDate | date: 'yyyy-MM-dd'"
          type="date"
          placeholder="e.g.4"
        />
      </div>
      <div class="col-6">
        <label class="form-label">Payment Status</label>
        <select class="form-select">
          <option>Pending</option>
          <option>Paid</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <label for="" class="form-label">Notes (Optional)</label>
        <textarea class="form-control" placeholder="Add remarks..."></textarea>
      </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-2">
      <button class="btn btn-success">Save job</button>
      <button class="btn btn-secondary">Cancel</button>
    </div>
  </form>
</div>
