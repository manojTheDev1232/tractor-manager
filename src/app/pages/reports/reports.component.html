<div class="card border-0 shadow-sm p-3 p-md-4">
  <div
    class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2"
  >
    <!-- <h3 class="mb-0">Reports</h3> -->
    <div class="d-flex gap-2 flex-wrap">
      <select
        class="form-select form-select-sm"
        style="width: auto"
        [value]="selectedRange"
        (change)="onRangeChange($any($event.target).value)"
      >
        <option value="thisMonth">This month</option>
        <option value="last3">Last 3 months</option>
        <option value="thisYear">This year</option>
        <option value="custom">Custom range</option>
      </select>
      <button class="btn btn-sm btn-outline-secondary" (click)="exportPdf()">
        <i class="ti ti-download"></i> Export PDF
      </button>
      <button class="btn btn-sm btn-outline-secondary" (click)="exportExcel()">
        <i class="ti ti-download"></i> Export Excel
      </button>
    </div>
  </div>

  <!-- Charts -->
  <div class="row g-4">
    <div class="col-md-7">
      <p class="fw-medium mb-2">Monthly trend</p>
      <div style="height: 260px">
        <canvas
          baseChart
          [data]="monthlyTrendData"
          [options]="barChartOptions"
          type="bar"
        >
        </canvas>
      </div>
    </div>

    <div class="col-md-5">
      <p class="fw-medium mb-2">Expense breakdown</p>
      <div style="height: 260px">
        <canvas
          baseChart
          [data]="expenseBreakdownData"
          [options]="doughnutOptions"
          type="doughnut"
        >
        </canvas>
      </div>
    </div>
  </div>
