<div class="container">
  <div class="d-flex justify-content-between align-items-center">
    <h5>Farmer Name</h5>
    <button class="btn btn-outline-dark">
      <i class="ti ti-plus"></i>Add farmer
    </button>
  </div>
  <input
    class="form-control mt-2"
    [value]="searchTerm()"
    (input)="onSearchChange($any($event.target).value)"
    type="text"
    placeholder="Search farmer..."
  />

  <div class="row g-3 mt-2">
    <div class="d-flex justify-content-center align-items-center">
      <p class="form-label" *ngIf="filteredJobs().length === 0">
        No record found
      </p>
    </div>

    <div
      class="col-md-4"
      *ngFor="let farmer of !searchTerm ? farmers() : filteredJobs()"
    >
      <div
        class="farmer-card"
        style="cursor: pointer"
        (click)="goToFarmerJobs(farmer.name)"
      >
        <div class="d-flex align-items-center gap-2 mb-2">
          <div
            class="avatar"
            [class.avatar-success]="farmer.pendingAmount === 0"
            [class.avatar-warning]="farmer.pendingAmount > 0"
          >
            {{ getInitials(farmer.name) }}
          </div>
          <div>
            <p class="farmer-name mb-0">{{ farmer.name }}</p>
            <p class="farmer-phone mb-0">{{ farmer.phone }}</p>
          </div>
        </div>
        <div class="d-flex justify-content-between">
          <span class="text-muted small">{{ farmer.totalJobs }} jobs</span>
          <span
            [class]="farmer.pendingAmount === 0 ? 'status-paid' : 'status-due'"
          >
            {{
              farmer.pendingAmount === 0
                ? "All paid"
                : "₹" + (farmer.pendingAmount | number) + " due"
            }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
